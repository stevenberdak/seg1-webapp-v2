<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>SEG1 Chat App</title>
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="icon" href="./favicon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="../js/create-chatroom.js"></script>
</head>

<body>
  <nav>
    <ul>
      <li><a href="/"><img src="/images/splash-logo.jpg" class="navlogo" /></a></li>
      <li><a href="/create-chatroom.html">Create Channel</a></li>
      <li><a href="/browse-chatrooms.html">Browse Chatrooms</a></li>
      <li style="margin-left: auto"><a href="Sign-In">Sign-In</a></li>
    </ul>
  </nav>
  <main>
    <div class="flex flex-col items-center justify-center w-full h-screen">
      <h1>Create Chat Room</h1>
      <h2>Enter Chat Room Details:</h2>
      <form action="javascript:createChatroom();">
        <label for="title">Title:</label>
        <input type="text" id="title-input" name="title"
          class="block rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6"
          placeholder="Title">
        <br><br>
        <label for="header">Header:</label>
        <input type="text" id="header-input" name="header"
          class="block rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6"
          placeholder="Header"><br><br>
        <label for="description">Description:</label>
        <input type="text" id="description-input" name="description"
          class="block rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6"
          placeholder="Description"><br><br>
        <input type="submit" value="Submit"
          class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 border border-blue-700 rounded">
      </form>
    </div>
  </main>
</body>

</html>

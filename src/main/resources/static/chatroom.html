<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatroom</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="../css/styles.css" />
  <script src="../js/chatroom.js" defer></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <nav class="bg-gray-300 p-4 flex items-center justify-between">
    <div class="flex items-center space-x-4">
      <a href="/"><img src="/images/splash-logo.jpg" alt="Logo" class="h-10" /></a>
      <a href="/create-chatroom" class="text-purple-800 font-semibold">Create Channel</a>
      <a href="/browse-chatrooms" class="text-purple-800 font-semibold">Browse Chatrooms</a>
    </div>
    <a href="/sign-in" class="text-blue-700 font-semibold">Sign-In</a>
  </nav>

  <main class="flex flex-col items-center justify-start min-h-screen px-4 space-y-4 mt-20">
    <header class="text-center">
      <h1 id="chatroom-title" class="text-3xl font-bold mb-2">Chatroom Title</h1>
      <h2 id="chatroom-header" class="text-md text-gray-600">Chatroom Header</h2>
    </header>

    <section id="message-container" class="w-full max-w-xl bg-white rounded shadow p-6 space-y-4 min-h-[300px]">
      <p id="chatroom-description" class="text-gray-700 italic">Description will appear here...</p>
      <p class="text-gray-500 italic">No messages yet...</p>
    </section>

    <footer class="w-full max-w-xl flex items-center gap-2">
      <input
        type="text"
        id="message-input"
        class="flex-1 border border-gray-400 rounded-md p-2 text-base"
        placeholder="Type a message..."
      />
      <button
        id="send-button"
        class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition"
      >
        Send
      </button>
    </footer>
  </main>
</body>
</html>

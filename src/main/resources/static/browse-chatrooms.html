<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>SEG1 Chat App</title>
  <link rel="stylesheet" href="./css/styles.css">

</head>

<body>
  <nav>
    <ul>
      <li><a href="/"><img src="/images/splash-logo.jpg" class="navlogo" /></a></li>
      <li><a href="/create-chatroom.html">Create Channel</a></li>
      <li><a href="/browse-chatrooms.html">Browse Chatrooms</a></li>
      <li style="margin-left: auto"><a href="Sign-In">Sign-In</a></li>
    </ul>
  </nav>
  <main>
    <div class="flex flex-row items-center justify-center w-full h-screen items-start divide-x divide-gray-300">

              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>

      <div class="flex flex-row flex-wrap basis-8/10 w-full h-screen justify-start gap-8 pt-24 pb-12 px-12" id="chatroom-list-box">

  <script>listChatrooms()</script>

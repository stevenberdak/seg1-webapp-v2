<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatroom</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <link rel="stylesheet" href="../css/styles.css" />
    <script src="../app/js/chatroom.js" defer></script>
</head>

<body class="bg-gray-100 text-gray-800">

    <nav class="bg-gray-300 p-4 flex items-center justify-between">
        <div class="flex items-center space-x-4">
            <a href="/"><img src="/images/splash-logo.jpg" alt="Logo" class="h-10" /></a>
            <a href="/app/create-chatroom.html" class="text-purple-800 font-semibold">Create Channel</a>
            <a href="/app/browse-chatrooms.html" class="text-purple-800 font-semibold">Browse Chatrooms</a>
        </div>
        <div>
            <a href="/sign-in.html" class="text-blue-700 font-semibold">Sign-In</a>
            <a href="/sign-up.html" class="text-blue-700 font-semibold">Sign-Up</a>
        </div>
    </nav>

    <main>
        <div class="flex flex-row w-full min-h-screen bg-gray-100 pt-20">
            <div class="flex flex-col items-center min-h-screen px-4 space-y-4">
                <h3 class="text-2xl font-bold text-center">User List</h3>
                <ul id="user-list" class="w-full h-full max-w-md space-y-2">
                    <!-- User list items will be dynamically added here -->
                </ul>
            </div>
            <div class="flex flex-col items-center justify-center w-full min-h-screen px-4 space-y-4">
                <header class="text-center">
                    <h1 id="chatroom-title" class="text-3xl font-bold mb-2"></h1>
                    <h2 id="chatroom-header" class="text-2xl font-bold mb-2"></h2>
                    <h3 id="chatroom-description"></h3>
                </header>

                <section id="message-container" class="w-full h-full flex-1 bg-white rounded shadow p-6 space-y-4">

                </section>

                <div class="w-full flex items-center gap-2 pb-20">
                    <input type="text" id="message-input" class="flex-1 border border-gray-400 rounded-md p-2 text-base"
                        placeholder="Type a message..." />
                    <button id="send-button"
                        class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
                        Send
                    </button>
                </div>
            </div>
        </div>
    </main>
</body>

</html>

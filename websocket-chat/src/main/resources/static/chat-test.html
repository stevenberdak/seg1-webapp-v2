<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multi-Room WebSocket Chat Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
    <h1>Multi-Room WebSocket Chat</h1>

    <label>Username: </label>
    <input type="text" id="username" placeholder="Enter your username" />
    <br><br>

    <label>Room ID: </label>
    <input type="text" id="roomId" placeholder="Enter room name (ex: room1)" />
    <br><br>

    <button onclick="connect()">Connect</button>

    <div id="chatArea" style="display: none;">
        <h3>Chat Messages</h3>
        <div id="messages" style="border: 1px solid black; width: 400px; height: 200px; overflow-y: scroll;"></div>

        <input type="text" id="messageInput" placeholder="Type a message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        let stompClient = null;
        let currentRoomId = '';

        function connect() {
            const username = document.getElementById("username").value.trim();
            const roomId = document.getElementById("roomId").value.trim();
            currentRoomId = roomId;

            const socket = new SockJS('/chat');  // backend point
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function () {
                document.getElementById("chatArea").style.display = "block";

                stompClient.subscribe('/topic/' + roomId, function (message) {
                    const msg = JSON.parse(message.body);
                    const messageElement = document.createElement('p');
                    messageElement.textContent = `[${msg.username}] ${msg.content}`;
                    document.getElementById("messages").appendChild(messageElement);
                });

                stompClient.send("/app/chat.addUser", {}, JSON.stringify({
                    username: username,
                    type: "JOIN",
                    roomId: roomId
                }));
            });
        }

        function sendMessage() {
            const messageInput = document.getElementById("messageInput").value.trim();
            const username = document.getElementById("username").value.trim();
            if (stompClient && messageInput) {
                stompClient.send("/app/chat.sendMessage", {}, JSON.stringify({
                    username: username,
                    content: messageInput,
                    type: "CHAT",
                    roomId: currentRoomId
                }));
                document.getElementById("messageInput").value = '';
            }
        }
    </script>
</body>
</html>
